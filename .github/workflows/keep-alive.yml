name: Keep Alive — Prevent Schedule Disable

on:
  schedule:
    - cron: '0 9 1 * *'   # 1st of every month, 9:00 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Keep repo active
        run: echo "Keep-alive ping — $(date)"
