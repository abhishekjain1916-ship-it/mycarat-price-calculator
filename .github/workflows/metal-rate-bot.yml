name: Metal Rate Bot — Surat (Gold 24K & Silver)

on:
  schedule:
    - cron: '30 8 * * *'   # 2:00 PM IST = 08:30 UTC daily
  workflow_dispatch:         # manual trigger for testing

jobs:
  fetch-rates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Fetch & save metal rates
        run: node scripts/fetch-metal-rates.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RECALCULATE_SECRET: ${{ secrets.RECALCULATE_SECRET }}
