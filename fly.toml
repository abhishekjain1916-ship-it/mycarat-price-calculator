app = "mycarat-price-calc"
primary_region = "sin"

[build]

[env]
  PORT = "3000"
  HOST = "0.0.0.0"
  NODE_ENV = "production"
  SHOPIFY_SHOP = "mycarat.myshopify.com"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "mycarat_data"
  destination = "/data"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
